<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <title>{% if page.title %}{{ page.title }} – {% endif %}{{ site.name }} – {{ site.description }}</title>

    {% include meta.html %}

    <!--[if lt IE 9]>
      <script src="http://html5shiv.googlecode.com/svn/trunk/html5.js"></script>
    <![endif]-->

    <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/style.css" />
    <link rel="alternate" type="application/rss+xml" title="{{ site.name }} - {{ site.description }}" href="{{ site.baseurl }}/feed.xml" />

    <!-- Created with Jekyll Now - http://github.com/barryclark/jekyll-now -->
  </head>

  <body>
    <div class="wrapper-masthead" role="banner">
      <div class="container">
        <header class="masthead clearfix">
          <a href="{{ site.baseurl }}/" class="site-avatar" aria-label="返回首页">
            <img src="{{ site.avatar }}" alt="{{ site.name }}的头像" />
          </a>

          <div class="site-info">
            <div class="site-name"><a href="{{ site.baseurl }}/">{{ site.name }}</a></div>
            <p class="site-description">{{ site.description }}</p>
          </div>

          <nav aria-label="主导航">
            <a href="/about">About</a>
            <a href="/thanks">Thanks</a>
          </nav>
        </header>
      </div>
    </div>

    <main id="main" class="container">
      {{ content }}
    </main>

    <div class="wrapper-footer" role="contentinfo">
      <div class="container">
        <footer class="footer">
          {% include svg-icons.html %}
        </footer>
      </div>
    </div>

    {% include analytics.html %}
  </body>
</html>
